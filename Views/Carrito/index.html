<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito de Compras</title>
    <!-- 1. CDN de Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-light min-vh-100 d-flex align-items-center py-4">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">

            <!-- Alerta componente adicional Bootstrap -->
            <div id="alerta-global" class="alert alert-danger alert-dismissible fade show d-none" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                <span id="alerta-mensaje"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="text-center mb-4">
                <h1 class="fw-bold text-success">
                    <i class="bi bi-cart3 me-2"></i>Carrito de Compras
                </h1>
                <p class="text-muted small">JULIO OLIVER GARCIA QUINTANA — 22340342</p>
            </div>

            <!-- 2. Formulario con inputs de Producto y Precio -->
            <form id="form-producto" novalidate>
                <div class="mb-3">
                    <label for="nombre" class="form-label fw-semibold">Nombre del producto</label>
                    <input type="text" class="form-control" id="nombre" placeholder="Ej. Laptop, Teclado...">
                </div>
                <div class="mb-3">
                    <label for="precio" class="form-label fw-semibold">Precio ($)</label>
                    <div class="input-group">
                        <span class="input-group-text">$</span>
                        <input type="number" class="form-control" id="precio" placeholder="0.00" min="0.01" step="0.01">
                    </div>
                </div>

                <!-- Botón Bootstrap -->
                <div class="d-grid mb-4">
                    <button type="button" id="agregar" class="btn btn-success btn-lg">
                        <i class="bi bi-plus-circle me-2"></i>Agregar al carrito
                    </button>
                </div>
            </form>

            <!-- Tarjeta (Card) con la lista de productos -->
            <div class="card shadow-sm">
                <div class="card-header bg-success text-white d-flex align-items-center justify-content-between">
                    <span class="fw-semibold"><i class="bi bi-list-ul me-2"></i>Lista de productos</span>
                    <span class="badge bg-white text-success" id="contador-badge">0 items</span>
                </div>

                <div class="card-body p-0">
                    <!-- Estado vacío -->
                    <div id="carrito-vacio" class="text-center py-5 text-muted">
                        <i class="bi bi-cart-x display-4 d-block mb-2"></i>
                        <p class="mb-0">Tu carrito está vacío</p>
                    </div>

                    <!-- Lista de productos -->
                    <ul id="lista" class="list-group list-group-flush"></ul>
                </div>

                <div class="card-footer bg-white">
                    <div class="d-flex justify-content-between align-items-center">
                        <span class="text-muted">Total:</span>
                        <span class="fs-5 fw-bold text-success">$<span id="total">0.00</span></span>
                    </div>
                </div>
            </div>

            <!-- Componente adicional: Progress bar del límite del carrito -->
            <div class="mt-4">
                <div class="d-flex justify-content-between small text-muted mb-1">
                    <span><i class="bi bi-speedometer2 me-1"></i>Límite del carrito</span>
                    <span id="progreso-texto">$0 / $100,000,000</span>
                </div>
                <div class="progress" style="height: 8px;" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
                    <div id="barra-progreso" class="progress-bar bg-success" style="width: 0%"></div>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
</body>
</html>
